name: Interview Experience
description: Share your real interview experience
title: "[Interview]: Company Name - Role"
labels: ["interview"]
body:
  - type: input
    id: company
    attributes:
      label: Company Name
      placeholder: e.g. Google, Flipkart
    validations:
      required: true

  - type: input
    id: role
    attributes:
      label: Role
      placeholder: e.g. Frontend Developer
    validations:
      required: true

  - type: dropdown
    id: experience
    attributes:
      label: Experience Level
      options:
        - Fresher
        - 1–2 Years
        - 3–5 Years
        - Senior (5+ Years)

  - type: dropdown
    id: year
    attributes:
      label: Interview Year
      options:
        - "2026"
        - "2025"
        - "2024"
        - "2023"
        - "2022"

  - type: textarea
    id: rounds
    attributes:
      label: Interview Rounds
      description: Describe the stages you went through, in order.
      placeholder: "e.g. HR screening → DSA round → System design → Manager round"

  - type: textarea
    id: questions
    attributes:
      label: Topics / Questions Asked
      description: Be as specific as you can — this is the most helpful part for others.
      placeholder: "e.g. React hooks, closures, event loop, two-sum on LeetCode, REST vs GraphQL..."
    validations:
      required: true

  - type: dropdown
    id: difficulty
    attributes:
      label: Difficulty
      options:
        - Easy
        - Medium
        - Hard

  - type: textarea
    id: tips
    attributes:
      label: Tips for Others
      placeholder: "e.g. Practice system design out loud, review CSS specificity..."

  - type: dropdown
    id: outcome
    attributes:
      label: Outcome
      options:
        - Selected / Offer received
        - Rejected
        - Waiting for result
        - Withdrew / Declined offer
        - Prefer not to say

  - type: checkboxes
    id: terms
    attributes:
      label: Confirmation
      options:
        - label: I confirm this is a real interview experience and the information is accurate to the best of my knowledge.
          required: true
